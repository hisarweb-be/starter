version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hisarweb_prod
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d hisarweb_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    # Production security
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      cache_from:
        - node:20-alpine
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/hisarweb_prod
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-${NEXT_PUBLIC_APP_URL}}
      # Performance optimizations
      NODE_OPTIONS: "--max-old-space-size=2048"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - appdata:/app/data
    networks:
      - app-network
    # Production security
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache

  # Redis for caching (optional but recommended for production)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redisdata:/data
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

  # Nginx reverse proxy (recommended for production)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
    driver: local
  appdata:
    driver: local
  redisdata:
    driver: local

networks:
  app-network:
    driver: bridge